spring:
  application:
    name: conference
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
    default-enum-type-handler: com.baomidou.mybatisplus.core.handlers.MybatisEnumTypeHandler
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.huiwutong.conference.entity

jwt:
  secret: ${JWT_SECRET:conference-secret-key-2026-huiwutong-min32chars}
  expiration: 86400000

file:
  upload-path: ${FILE_UPLOAD_PATH:./uploads}

app:
  config:
    secret: ${APP_CONFIG_SECRET:HuiWuTong2026@Conference-Secret!}

credential:
  # 凭证有效期（天），默认 365 天
  expire-days: ${CREDENTIAL_EXPIRE_DAYS:365}

payment:
  expire-minutes: 15
  wechat:
    enabled: ${WECHAT_PAY_ENABLED:false}
    app-id: ${WECHAT_APP_ID:}
    mch-id: ${WECHAT_MCH_ID:}
    api-v3-key: ${WECHAT_API_V3_KEY:}
    private-key-path: ${WECHAT_PRIVATE_KEY_PATH:classpath:cert/apiclient_key.pem}
    cert-serial-no: ${WECHAT_CERT_SERIAL_NO:}
    notify-url: ${WECHAT_NOTIFY_URL:http://localhost:8080/api/payment/notify/wechat}
  alipay:
    enabled: ${ALIPAY_ENABLED:false}
    app-id: ${ALIPAY_APP_ID:}
    private-key: ${ALIPAY_PRIVATE_KEY:}
    public-key: ${ALIPAY_PUBLIC_KEY:}
    gateway-url: https://openapi.alipay.com/gateway.do
    notify-url: ${ALIPAY_NOTIFY_URL:http://localhost:8080/api/payment/notify/alipay}
    return-url: ${ALIPAY_RETURN_URL:http://localhost:3000/payment/return}
  unionpay:
    enabled: false
  paypal:
    enabled: false
